<!DOCTYPE html>
<html>
<head>
    <title>Ad Viewer</title>
</head>

<body style="text-align:center; font-family:Arial; background:#f5f5f5;">

<h2>Watch Advertisement</h2>

<!-- 🎬 PREMIUM VIDEO -->
<iframe width="420" height="240"
src="https://www.youtube.com/embed/tgbNymZ7vqY?autoplay=1&mute=1&controls=1&rel=0"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<br><br>

<button onclick="clickAd()" style="padding:10px 20px; font-size:16px;">
    Click Ad
</button>

<div id="result" style="margin-top:20px; font-weight:bold;"></div>

<script>
function clickAd() {
    fetch('/click', {
        method: 'POST'
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            "IP: " + data.ip + "<br>" +
            "Result: " + (data.fraud ? "FRAUD ❌" : "GENUINE ✅") + "<br>" +
            "Reason: " + data.reason;
    });
}
</script>

</body>
</html>
