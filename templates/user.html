<!DOCTYPE html>
<html>
<head>
    <title>Ad Viewer</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f5f5f5;
        }

        video {
            width: 400px;
            margin-top: 20px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Watch Advertisement</h2>

<video controls>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>

<br>

<button onclick="clickAd()">Click Ad</button>

<div id="result"></div>

<script>
function clickAd() {
    fetch('/click', {
        method: 'POST'
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerHTML =
            "IP: " + data.ip + "<br>" +
            "Result: " + (data.fraud ? "FRAUD ❌" : "GENUINE ✅") + "<br>" +
            "Reason: " + data.reason;
    });
}
</script>

</body>
</html>
