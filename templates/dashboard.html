<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f5f7fa;
            font-family: Arial;
        }

        .card {
            border-radius: 10px;
            padding: 20px;
            color: white;
        }

        .blue { background: #007bff; }
        .red { background: #dc3545; }
        .green { background: #28a745; }

        .section-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Fraud Detection Dashboard</h2>

    <!-- 📊 CARDS -->
    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card blue">
                <h5>Total Clicks</h5>
                <h3>{{ total }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card red">
                <h5>Fraud</h5>
                <h3>{{ fraud }}</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card green">
                <h5>Genuine</h5>
                <h3>{{ genuine }}</h3>
            </div>
        </div>
    </div>

    <!-- 📊 MAIN CHARTS -->
    <div class="row">
        <div class="col-md-6">
            <div class="section-box">
                <canvas id="pieChart"></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="section-box">
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>

    <!-- 🚀 NEW: FRAUD REASONS SECTION -->
    <div class="section-box">

        <h4 class="text-center mb-3">Fraud Reasons Analysis</h4>

        <!-- 📋 LIST -->
        <ul class="list-group mb-4">
            {% for reason, count in reasons.items() %}
                <li class="list-group-item d-flex justify-content-between">
                    {{ reason }}
                    <span class="badge bg-danger">{{ count }}</span>
                </li>
            {% endfor %}
        </ul>

        <!-- 📊 GRAPH -->
        <canvas id="reasonChart"></canvas>

    </div>

</div>

<script>
    let fraud = {{ fraud }};
    let genuine = {{ genuine }};

    // 📊 PIE CHART
    new Chart(document.getElementById("pieChart"), {
        type: 'pie',
        data: {
            labels: ['Genuine', 'Fraud'],
            datasets: [{
                data: [genuine, fraud],
                backgroundColor: ['green', 'red']
            }]
        }
    });

    // 📊 BAR CHART
    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: ['Genuine', 'Fraud'],
            datasets: [{
                data: [genuine, fraud],
                backgroundColor: ['green', 'red']
            }]
        }
    });

    // 🚀 FRAUD REASON GRAPH
    const reasonLabels = {{ reasons.keys()|list|tojson }};
    const reasonData = {{ reasons.values()|list|tojson }};

    new Chart(document.getElementById("reasonChart"), {
        type: 'bar',
        data: {
            labels: reasonLabels,
            datasets: [{
                label: 'Fraud Reasons Count',
                data: reasonData,
                backgroundColor: 'orange'
            }]
        }
    });

    // 🔄 AUTO REFRESH
    setInterval(() => {
        location.reload();
    }, 3000);
</script>

</body>
</html>
